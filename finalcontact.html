<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pretty & Powerful | Contact</title>

    <script src="menu.js"></script>

    <script>

        function submitForm(event) {
            alert('Your form has been Submitted! You\'ll hear from Us Soon!');
        }
    </script>

    <!-- Bootstrap CSS file -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Bootstrap JS file -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="final_css.css">

</head>
<body>
    <div class="container">
        <header>
            <div id="logo">
                <img src="final-project/bunnies.png" alt="Logo">
            </div>

            <div id="title">
                <h1>pretty & powerful</h1>
            </div>

        </header> <!--end of header-->

        <nav>
            <div class="dropdown">
                <!--hidden buttons-->
                <div id="myDropdown" class="dropdown-content">
                    <a href="finalHome.html">Home</a>
                    <a href="finalworkout.html">Workout</a>
                    <a href="finalnutrition.html">Nutrition</a>
                    <a href="finalselfcare.html">Self-care</a>
                    <a href="finalblog.html">Blog</a>
                    <a href="finalcontact.html">Contact</a>
                </div>
                <!--end of hidden buttons-->
            </div> <!--end of dropdown-->

            <!--menu button-->
            <button onclick="myFunction();" class="dropbtn">
                menu
            </button>
        </nav>

        <div class="row">
            <div class="col-12">
                <div id="hero-contact">
                    <h1>Contact Us</h1>
                </div>
            </div> 
            
            <div class="col-12">
                <div class="contact-txt">
                    <p>Have questions, ideas, or just want to connect?<br> We would love to hear from you! <br> Fill out the form below, and we’ll get back to you as soon as possible!</p> <br>

                    <form id="contactform" onsubmit="submitForm(event)">
                        <fieldset>
                            <label for="name">Name:</label>
                            <input type="text" id="characterName" size="20" placeholder="Hanabi"><br>

                            <label for="email">Email:</label>
                            <input type="email" id="userEmail" size="20" placeholder="xoxo@pinkpower.com"><br>

                            <label for="notes">Notes:</label>
                            <br>
                            <textarea id="characterBio" cols="30" rows="4" placeholder="I would love a section on practing shadow work!"></textarea><br>

                            <input type="submit" value="Submit Form">
                        </fieldset>
                    </form>
                </div>
            </div> 
        </div> 

        <footer>
            <small>pretty & powerful</small>
        </footer>
    </div> <!--end of container-->

</body>
</html>
